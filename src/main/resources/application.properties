# ============================================================================
# Spring Boot + GemFire Demo Configuration
# ============================================================================

spring.application.name=gemfire-springboot-demo
server.port=8080

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=always

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.gemfire.demo=INFO
logging.level.org.springframework.data.gemfire=WARN
logging.level.org.apache.geode=WARN
